name: Deploy tg-geo-pop

on:
  push:
    branches: [main]

env:
  ECR_REPO: terra-guard/tg-geo-pop
  CARGO_TARGET: aarch64-unknown-linux-gnu

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            api/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('api/Cargo.lock') }}

      - name: Run tests
        working-directory: api
        run: cargo test --release

  deploy:
    name: Build, Push and Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + ARM64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.CARGO_TARGET }}

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo (cross-compile)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            api/target
          key: ${{ runner.os }}-cargo-arm64-${{ hashFiles('api/Cargo.lock') }}

      - name: Cross-compile for ARM64
        working-directory: api
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ env.CARGO_TARGET }}
          cp target/${{ env.CARGO_TARGET }}/release/geopop-api target/geopop-api-arm64

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.deploy
          push: true
          provenance: false
          platforms: linux/arm64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 971422717437.dkr.ecr.us-east-1.amazonaws.com",
              "cd /opt/terraguard/server-b",
              "docker-compose pull tg-geo-pop",
              "docker-compose up -d --no-deps tg-geo-pop"
            ]' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Deployment failed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi

            echo "Status: $STATUS, waiting..."
            sleep 10
          done

          echo "Deployment timed out"
          exit 1
